<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cave Graphics | Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --ink: #101114;
      --panel: #17191f;
      --panel-2: #20232b;
      --line: #343844;
      --line-soft: #282b34;
      --text: #f5f1e8;
      --muted: #a7a495;
      --faint: #77756c;
      --teal: #4dd4c6;
      --teal-soft: #173936;
      --amber: #ffbc58;
      --amber-soft: #3c2e19;
      --rose: #ff6f8d;
      --rose-soft: #3b1c25;
      --green: #8bd676;
      --green-soft: #21341d;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.34);
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    html { background: var(--ink); }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        linear-gradient(rgba(245, 241, 232, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245, 241, 232, 0.025) 1px, transparent 1px),
        linear-gradient(145deg, #111217 0%, #17191e 48%, #121315 100%);
      background-size: 42px 42px, 42px 42px, auto;
      -webkit-font-smoothing: antialiased;
    }

    button, input { font: inherit; }

    .app {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 34px 0 54px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      margin-bottom: 28px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .mark {
      width: 48px;
      height: 48px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      display: grid;
      place-items: center;
      background:
        linear-gradient(135deg, rgba(77, 212, 198, 0.14), transparent 46%),
        var(--panel);
      box-shadow: inset 0 1px rgba(255, 255, 255, 0.04);
      flex: 0 0 auto;
    }

    .mark span {
      font-family: "JetBrains Mono", monospace;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0;
      color: var(--teal);
    }

    h1 {
      font-size: clamp(28px, 5vw, 48px);
      line-height: 0.95;
      margin: 0;
      letter-spacing: 0;
      font-weight: 800;
    }

    .subtitle {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 9px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(23, 25, 31, 0.82);
      color: var(--muted);
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
      white-space: nowrap;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--faint);
    }

    .status.live .status-dot {
      background: var(--green);
      box-shadow: 0 0 0 5px rgba(139, 214, 118, 0.12), 0 0 14px rgba(139, 214, 118, 0.65);
    }

    .status.syncing .status-dot {
      background: var(--amber);
      box-shadow: 0 0 0 5px rgba(255, 188, 88, 0.12);
    }

    .status.offline .status-dot {
      background: var(--rose);
      box-shadow: 0 0 0 5px rgba(255, 111, 141, 0.12);
    }

    .layout {
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr);
      gap: 20px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(23, 25, 31, 0.9);
      box-shadow: var(--shadow);
    }

    .composer {
      position: sticky;
      top: 18px;
      padding: 18px;
    }

    .panel-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    .panel-title h2 {
      margin: 0;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text);
    }

    .mini-count {
      font-family: "JetBrains Mono", monospace;
      color: var(--teal);
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid rgba(77, 212, 198, 0.35);
      background: rgba(77, 212, 198, 0.08);
    }

    .field {
      display: grid;
      gap: 8px;
      margin-bottom: 14px;
    }

    label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .input-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 46px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #111217;
      color: var(--muted);
      padding: 0 12px;
    }

    .input-wrap:focus-within {
      border-color: var(--teal);
      box-shadow: 0 0 0 4px rgba(77, 212, 198, 0.1);
    }

    .input-wrap i { width: 18px; height: 18px; flex: 0 0 auto; }

    input {
      width: 100%;
      min-width: 0;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      padding: 12px 0;
    }

    input::placeholder { color: var(--faint); }
    input[type="date"] { color-scheme: dark; }

    .primary-btn {
      width: 100%;
      min-height: 46px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      border: 1px solid rgba(77, 212, 198, 0.42);
      border-radius: var(--radius);
      color: #071412;
      background: var(--teal);
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.16s ease, box-shadow 0.16s ease, filter 0.16s ease;
    }

    .primary-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 30px rgba(77, 212, 198, 0.2);
      filter: saturate(1.08);
    }

    .primary-btn:focus-visible,
    .icon-btn:focus-visible,
    .ghost-btn:focus-visible {
      outline: 2px solid var(--amber);
      outline-offset: 3px;
    }

    .primary-btn i,
    .ghost-btn i,
    .icon-btn i { width: 18px; height: 18px; }

    .metrics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 18px;
    }

    .metric {
      border: 1px solid var(--line-soft);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.025);
      padding: 12px;
    }

    .metric strong {
      display: block;
      font-size: 24px;
      line-height: 1;
      color: var(--text);
    }

    .metric span {
      display: block;
      margin-top: 5px;
      color: var(--faint);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .board {
      min-width: 0;
    }

    .board-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      padding: 16px;
      border-bottom: 1px solid var(--line);
      align-items: center;
    }

    .search {
      margin: 0;
    }

    .ghost-btn {
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel-2);
      color: var(--muted);
      padding: 0 12px;
      cursor: pointer;
    }

    .ghost-btn:hover {
      color: var(--text);
      border-color: var(--amber);
      background: var(--amber-soft);
    }

    .task-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .task-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      padding: 16px;
      border-bottom: 1px solid var(--line-soft);
      background: rgba(23, 25, 31, 0.5);
      transition: background 0.16s ease, border-color 0.16s ease;
    }

    .task-row:hover,
    .task-row:focus-within {
      background: rgba(32, 35, 43, 0.86);
      border-color: rgba(77, 212, 198, 0.26);
    }

    .task-main {
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr);
      gap: 14px;
      min-width: 0;
    }

    .task-number {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: var(--faint);
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
      background: #111217;
    }

    .task-copy {
      min-width: 0;
      display: grid;
      gap: 7px;
    }

    .task-text {
      margin: 0;
      font-size: 16px;
      line-height: 1.42;
      font-weight: 700;
      color: var(--text);
      overflow-wrap: anywhere;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      color: var(--faint);
      font-size: 12px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 26px;
      border-radius: 999px;
      border: 1px solid var(--line);
      padding: 0 9px;
      color: var(--muted);
      background: #111217;
      font-size: 12px;
      white-space: nowrap;
    }

    .pill i { width: 14px; height: 14px; }
    .pill.today { border-color: rgba(255, 188, 88, 0.5); color: var(--amber); background: var(--amber-soft); }
    .pill.overdue { border-color: rgba(255, 111, 141, 0.5); color: var(--rose); background: var(--rose-soft); }
    .pill.upcoming { border-color: rgba(77, 212, 198, 0.45); color: var(--teal); background: var(--teal-soft); }

    .task-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .icon-btn {
      width: 38px;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #111217;
      color: var(--muted);
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: opacity 0.16s ease, transform 0.16s ease, background 0.16s ease, border-color 0.16s ease, color 0.16s ease;
    }

    .complete-btn:hover {
      color: var(--green);
      border-color: rgba(139, 214, 118, 0.5);
      background: var(--green-soft);
    }

    .edit-btn {
      opacity: 0;
      transform: translateX(4px);
    }

    .task-row:hover .edit-btn,
    .task-row:focus-within .edit-btn {
      opacity: 1;
      transform: translateX(0);
    }

    .edit-btn:hover {
      color: var(--teal);
      border-color: rgba(77, 212, 198, 0.5);
      background: var(--teal-soft);
    }

    .edit-box {
      display: grid;
      gap: 10px;
    }

    .edit-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 170px;
      gap: 10px;
    }

    .edit-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .save-btn { color: var(--teal); }
    .cancel-btn { color: var(--rose); }

    .empty {
      padding: 56px 18px;
      text-align: center;
      color: var(--faint);
    }

    .empty i {
      width: 36px;
      height: 36px;
      color: var(--teal);
      margin-bottom: 12px;
    }

    .empty strong {
      display: block;
      color: var(--text);
      margin-bottom: 5px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%) translateY(18px);
      opacity: 0;
      pointer-events: none;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #111217;
      color: var(--text);
      padding: 11px 14px;
      box-shadow: var(--shadow);
      transition: opacity 0.18s ease, transform 0.18s ease;
      z-index: 10;
      max-width: calc(100% - 32px);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 880px) {
      .layout { grid-template-columns: 1fr; }
      .composer { position: static; }
    }

    @media (max-width: 620px) {
      .app { width: min(100% - 22px, 1180px); padding-top: 22px; }
      .topbar { align-items: flex-start; flex-direction: column; }
      .status { width: 100%; justify-content: center; }
      .board-head { grid-template-columns: 1fr; }
      .task-row { grid-template-columns: 1fr; }
      .task-actions { justify-content: flex-end; }
      .edit-grid { grid-template-columns: 1fr; }
      .metrics { grid-template-columns: 1fr; }
      .edit-btn { opacity: 1; transform: none; }
    }

    @media (hover: none) {
      .edit-btn { opacity: 1; transform: none; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="mark" aria-hidden="true"><span>CG</span></div>
        <div>
          <h1>Cave Graphics</h1>
          <p class="subtitle">Panel central de recursos y entregas graficas</p>
        </div>
      </div>
      <div class="status" id="sync-status" role="status" aria-live="polite">
        <span class="status-dot"></span>
        <span id="sync-text">Local</span>
      </div>
    </header>

    <div class="layout">
      <section class="panel composer" aria-label="Nueva tarea">
        <div class="panel-title">
          <h2>Nueva tarea</h2>
          <span class="mini-count" id="active-count">0 activas</span>
        </div>

        <form id="task-form" autocomplete="off">
          <div class="field">
            <label for="task-input">Descripcion</label>
            <div class="input-wrap">
              <i data-lucide="pen-line"></i>
              <input id="task-input" type="text" placeholder="Logo, banner, mockup, ajuste..." required>
            </div>
          </div>

          <div class="field">
            <label for="date-input">Entrega</label>
            <div class="input-wrap">
              <i data-lucide="calendar-days"></i>
              <input id="date-input" type="date">
            </div>
          </div>

          <button class="primary-btn" type="submit">
            <i data-lucide="plus"></i>
            Agregar
          </button>
        </form>

        <div class="metrics" aria-label="Resumen">
          <div class="metric">
            <strong id="today-count">0</strong>
            <span>Hoy</span>
          </div>
          <div class="metric">
            <strong id="overdue-count">0</strong>
            <span>Vencidas</span>
          </div>
        </div>
      </section>

      <section class="panel board" aria-label="Lista de tareas">
        <div class="board-head">
          <div class="field search">
            <label for="search-input">Buscar</label>
            <div class="input-wrap">
              <i data-lucide="search"></i>
              <input id="search-input" type="search" placeholder="Filtrar por nombre o fecha">
            </div>
          </div>
          <button class="ghost-btn" type="button" id="refresh-btn">
            <i data-lucide="refresh-cw"></i>
            Actualizar
          </button>
        </div>
        <ul class="task-list" id="task-list"></ul>
      </section>
    </div>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    (() => {
      const STORAGE_KEY = "cave-graphics-panel-cache";
      const TABLE = "tasks";
      const SUPABASE_URL = "https://owltcxzfbitmbynhwtvq.supabase.co";
      const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im93bHRjeHpmYml0bWJ5bmh3dHZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1Mzg2NTYsImV4cCI6MjA5OTExNDY1Nn0.Xf3F193KXHSH5lJkPoOfzlaeymRpK2AXPqofI07AYVs";

      const els = {
        form: document.getElementById("task-form"),
        input: document.getElementById("task-input"),
        date: document.getElementById("date-input"),
        search: document.getElementById("search-input"),
        list: document.getElementById("task-list"),
        refresh: document.getElementById("refresh-btn"),
        sync: document.getElementById("sync-status"),
        syncText: document.getElementById("sync-text"),
        activeCount: document.getElementById("active-count"),
        todayCount: document.getElementById("today-count"),
        overdueCount: document.getElementById("overdue-count"),
        toast: document.getElementById("toast")
      };

      const state = {
        client: null,
        tasks: [],
        editingId: null,
        query: "",
        refreshTimer: null,
        toastTimer: null
      };

      function nowMs() {
        return Date.now();
      }

      function id() {
        if (crypto && crypto.randomUUID) return crypto.randomUUID();
        return nowMs().toString(36) + Math.random().toString(36).slice(2, 9);
      }

      function toMs(value) {
        if (typeof value === "number") return value;
        if (typeof value === "string" && /^\d+$/.test(value)) return Number(value);
        const parsed = Date.parse(value || "");
        return Number.isFinite(parsed) ? parsed : nowMs();
      }

      function normalize(row) {
        return {
          id: String(row.id),
          text: String(row.text || "").trim(),
          date: row.date || "",
          createdAt: toMs(row.created_at),
          updatedAt: toMs(row.updated_at || row.created_at)
        };
      }

      function dbRow(task) {
        return {
          id: task.id,
          text: task.text,
          date: task.date || null,
          created_at: task.createdAt,
          updated_at: task.updatedAt || task.createdAt
        };
      }

      function persist() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state.tasks));
      }

      function hydrate() {
        try {
          const cached = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
          state.tasks = cached.map(normalize).filter(task => task.text);
        } catch {
          state.tasks = [];
        }
      }

      function setStatus(kind, label) {
        els.sync.className = "status " + kind;
        els.syncText.textContent = label;
      }

      function showToast(message) {
        els.toast.textContent = message;
        els.toast.classList.add("show");
        clearTimeout(state.toastTimer);
        state.toastTimer = setTimeout(() => els.toast.classList.remove("show"), 2800);
      }

      function sortTasks(tasks) {
        return [...tasks].sort((a, b) => {
          const newest = b.createdAt - a.createdAt;
          if (newest) return newest;
          return b.updatedAt - a.updatedAt;
        });
      }

      function daysUntil(dateString) {
        if (!dateString) return null;
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const target = new Date(dateString + "T00:00:00");
        return Math.round((target - today) / 86400000);
      }

      function dueMeta(task) {
        const diff = daysUntil(task.date);
        if (diff === null) return { cls: "", text: "Sin fecha", icon: "calendar" };
        if (diff < 0) return { cls: "overdue", text: "Vencida D+" + Math.abs(diff), icon: "alert-circle" };
        if (diff === 0) return { cls: "today", text: "Entrega hoy", icon: "flame" };
        return { cls: "upcoming", text: "D-" + diff, icon: "calendar-clock" };
      }

      function dateLabel(dateString) {
        if (!dateString) return "sin entrega";
        return new Intl.DateTimeFormat("es", { day: "2-digit", month: "short", year: "numeric" }).format(new Date(dateString + "T00:00:00"));
      }

      function timeLabel(ms) {
        return new Intl.DateTimeFormat("es", { day: "2-digit", month: "short", hour: "2-digit", minute: "2-digit" }).format(new Date(ms));
      }

      function upsertLocal(task) {
        const next = normalize(task);
        const index = state.tasks.findIndex(item => item.id === next.id);
        if (index >= 0) state.tasks[index] = { ...state.tasks[index], ...next };
        else state.tasks.push(next);
        state.tasks = sortTasks(state.tasks);
        persist();
        render();
      }

      function removeLocal(taskId) {
        state.tasks = state.tasks.filter(task => task.id !== taskId);
        if (state.editingId === taskId) state.editingId = null;
        persist();
        render();
      }

      async function fetchLatest(source = "manual") {
        if (!state.client) return;
        setStatus("syncing", "Sincronizando");
        const { data, error } = await state.client
          .from(TABLE)
          .select("*")
          .order("created_at", { ascending: false });

        if (error) {
          setStatus("offline", "Sin conexion");
          if (source === "manual") showToast("No se pudo actualizar desde Supabase");
          return;
        }

        state.tasks = sortTasks((data || []).map(normalize).filter(task => task.text));
        persist();
        render();
        setStatus("live", "En vivo");
      }

      function scheduleRefresh() {
        clearTimeout(state.refreshTimer);
        state.refreshTimer = setTimeout(() => fetchLatest("realtime"), 260);
      }

      async function connect() {
        if (!window.supabase) {
          setStatus("offline", "Local");
          return;
        }

        state.client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
          realtime: { params: { eventsPerSecond: 8 } }
        });

        await fetchLatest("startup");

        state.client
          .channel("public:tasks")
          .on("postgres_changes", { event: "*", schema: "public", table: TABLE }, payload => {
            if (payload.eventType === "DELETE") {
              removeLocal(String(payload.old.id));
            } else if (payload.new) {
              upsertLocal(payload.new);
            }
            scheduleRefresh();
          })
          .subscribe(status => {
            if (status === "SUBSCRIBED") setStatus("live", "En vivo");
            if (status === "CHANNEL_ERROR" || status === "TIMED_OUT" || status === "CLOSED") {
              setStatus("offline", "Sin conexion");
            }
          });
      }

      async function insertRemote(task) {
        if (!state.client) return false;
        const payload = dbRow(task);
        let result = await state.client.from(TABLE).insert(payload);
        if (result.error && String(result.error.message || "").includes("updated_at")) {
          delete payload.updated_at;
          result = await state.client.from(TABLE).insert(payload);
        }
        if (result.error) {
          setStatus("offline", "Sin conexion");
          showToast("No se pudo guardar en Supabase");
          return false;
        }
        return true;
      }

      async function updateRemote(taskId, patch) {
        if (!state.client) return false;
        const payload = { ...patch, updated_at: nowMs() };
        let result = await state.client.from(TABLE).update(payload).eq("id", taskId);
        if (result.error && String(result.error.message || "").includes("updated_at")) {
          delete payload.updated_at;
          result = await state.client.from(TABLE).update(payload).eq("id", taskId);
        }
        if (result.error) {
          setStatus("offline", "Sin conexion");
          showToast("No se pudo editar en Supabase");
          return false;
        }
        return true;
      }

      async function deleteRemote(taskId) {
        if (!state.client) return false;
        const { error } = await state.client.from(TABLE).delete().eq("id", taskId);
        if (error) {
          setStatus("offline", "Sin conexion");
          showToast("No se pudo quitar en Supabase");
          return false;
        }
        return true;
      }

      async function addTask(text, date) {
        const trimmed = text.trim();
        if (!trimmed) return;

        const createdAt = nowMs();
        const task = {
          id: id(),
          text: trimmed,
          date: date || "",
          createdAt,
          updatedAt: createdAt
        };

        upsertLocal(task);
        els.form.reset();
        els.input.focus();

        const saved = await insertRemote(task);
        if (!saved && !state.client) showToast("Guardado localmente");
      }

      async function commitEdit(taskId, text, date) {
        const trimmed = text.trim();
        if (!trimmed) return;

        const task = state.tasks.find(item => item.id === taskId);
        if (!task) return;

        const patch = { text: trimmed, date: date || null };
        upsertLocal({ ...task, ...patch, updatedAt: nowMs() });
        state.editingId = null;
        render();

        await updateRemote(taskId, patch);
      }

      async function completeTask(taskId) {
        removeLocal(taskId);
        await deleteRemote(taskId);
      }

      function filteredTasks() {
        const query = state.query.trim().toLowerCase();
        const ordered = sortTasks(state.tasks);
        if (!query) return ordered;
        return ordered.filter(task => {
          const haystack = [task.text, task.date, dateLabel(task.date), timeLabel(task.createdAt)].join(" ").toLowerCase();
          return haystack.includes(query);
        });
      }

      function renderStats() {
        const total = state.tasks.length;
        const today = state.tasks.filter(task => daysUntil(task.date) === 0).length;
        const overdue = state.tasks.filter(task => {
          const diff = daysUntil(task.date);
          return diff !== null && diff < 0;
        }).length;

        els.activeCount.textContent = total + (total === 1 ? " activa" : " activas");
        els.todayCount.textContent = today;
        els.overdueCount.textContent = overdue;
      }

      function makeIcon(name) {
        const icon = document.createElement("i");
        icon.setAttribute("data-lucide", name);
        return icon;
      }

      function renderEdit(task, container) {
        const box = document.createElement("form");
        box.className = "edit-box";

        const grid = document.createElement("div");
        grid.className = "edit-grid";

        const textWrap = document.createElement("div");
        textWrap.className = "input-wrap";
        textWrap.appendChild(makeIcon("pen-line"));
        const textInput = document.createElement("input");
        textInput.type = "text";
        textInput.value = task.text;
        textInput.required = true;
        textWrap.appendChild(textInput);

        const dateWrap = document.createElement("div");
        dateWrap.className = "input-wrap";
        dateWrap.appendChild(makeIcon("calendar-days"));
        const dateInput = document.createElement("input");
        dateInput.type = "date";
        dateInput.value = task.date || "";
        dateWrap.appendChild(dateInput);

        grid.append(textWrap, dateWrap);

        const actions = document.createElement("div");
        actions.className = "edit-actions";

        const save = document.createElement("button");
        save.className = "ghost-btn save-btn";
        save.type = "submit";
        save.append(makeIcon("check"), document.createTextNode("Guardar"));

        const cancel = document.createElement("button");
        cancel.className = "ghost-btn cancel-btn";
        cancel.type = "button";
        cancel.append(makeIcon("x"), document.createTextNode("Cancelar"));
        cancel.addEventListener("click", () => {
          state.editingId = null;
          render();
        });

        actions.append(save, cancel);
        box.append(grid, actions);
        box.addEventListener("submit", event => {
          event.preventDefault();
          commitEdit(task.id, textInput.value, dateInput.value);
        });

        textInput.addEventListener("keydown", event => {
          if (event.key === "Escape") {
            state.editingId = null;
            render();
          }
        });

        container.appendChild(box);
        requestAnimationFrame(() => {
          textInput.focus();
          textInput.setSelectionRange(textInput.value.length, textInput.value.length);
        });
      }

      function renderTask(task, index) {
        const li = document.createElement("li");
        li.className = "task-row";
        li.dataset.id = task.id;

        const main = document.createElement("div");
        main.className = "task-main";

        const number = document.createElement("span");
        number.className = "task-number";
        number.textContent = String(index + 1).padStart(2, "0");

        const copy = document.createElement("div");
        copy.className = "task-copy";

        if (state.editingId === task.id) {
          renderEdit(task, copy);
        } else {
          const title = document.createElement("p");
          title.className = "task-text";
          title.textContent = task.text;

          const meta = document.createElement("div");
          meta.className = "meta";

          const due = dueMeta(task);
          const duePill = document.createElement("span");
          duePill.className = "pill " + due.cls;
          duePill.append(makeIcon(due.icon), document.createTextNode(due.text));

          const datePill = document.createElement("span");
          datePill.className = "pill";
          datePill.append(makeIcon("clock-3"), document.createTextNode("Agregada " + timeLabel(task.createdAt)));

          const deliveryPill = document.createElement("span");
          deliveryPill.className = "pill";
          deliveryPill.append(makeIcon("calendar"), document.createTextNode(dateLabel(task.date)));

          meta.append(duePill, deliveryPill, datePill);
          copy.append(title, meta);
        }

        main.append(number, copy);

        const actions = document.createElement("div");
        actions.className = "task-actions";

        const complete = document.createElement("button");
        complete.className = "icon-btn complete-btn";
        complete.type = "button";
        complete.title = "Quitar";
        complete.setAttribute("aria-label", "Quitar " + task.text);
        complete.appendChild(makeIcon("circle-check"));
        complete.addEventListener("click", () => completeTask(task.id));

        const edit = document.createElement("button");
        edit.className = "icon-btn edit-btn";
        edit.type = "button";
        edit.title = "Editar";
        edit.setAttribute("aria-label", "Editar " + task.text);
        edit.appendChild(makeIcon("pencil"));
        edit.addEventListener("click", () => {
          state.editingId = task.id;
          render();
        });

        actions.append(complete, edit);
        li.append(main, actions);
        return li;
      }

      function render() {
        renderStats();
        els.list.innerHTML = "";
        const tasks = filteredTasks();

        if (!tasks.length) {
          const empty = document.createElement("li");
          empty.className = "empty";
          empty.append(makeIcon(state.query ? "search-x" : "layers"));
          const strong = document.createElement("strong");
          strong.textContent = state.query ? "Sin resultados" : "Panel vacio";
          const small = document.createElement("span");
          small.textContent = state.query ? "Prueba con otro filtro." : "Agrega la primera tarea.";
          empty.append(strong, small);
          els.list.appendChild(empty);
        } else {
          tasks.forEach((task, index) => els.list.appendChild(renderTask(task, index)));
        }

        if (window.lucide) window.lucide.createIcons();
      }

      els.form.addEventListener("submit", event => {
        event.preventDefault();
        addTask(els.input.value, els.date.value);
      });

      els.search.addEventListener("input", event => {
        state.query = event.target.value;
        render();
      });

      els.refresh.addEventListener("click", () => fetchLatest("manual"));

      window.addEventListener("online", () => fetchLatest("online"));
      window.addEventListener("focus", () => fetchLatest("focus"));
      document.addEventListener("visibilitychange", () => {
        if (!document.hidden) fetchLatest("visible");
      });

      hydrate();
      render();
      connect();
    })();
  </script>
</body>
</html>
