<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cave Graphics | Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --ink: #0c0e13;
      --panel: #15181f;
      --panel-2: #1d2029;
      --panel-3: #232734;
      --line: #353a48;
      --line-soft: #262a35;
      --text: #f5f1e8;
      --muted: #a7a495;
      --faint: #74716a;
      --teal: #4dd4c6;
      --teal-soft: #173936;
      --amber: #ffbc58;
      --amber-soft: #3c2e19;
      --rose: #ff6f8d;
      --rose-soft: #3b1c25;
      --green: #8bd676;
      --green-soft: #21341d;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      --shadow-sm: 0 8px 24px rgba(0, 0, 0, 0.28);
      --radius: 10px;
      --radius-sm: 7px;
    }

    * { box-sizing: border-box; }
    html { background: var(--ink); }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(900px 500px at 12% -8%, rgba(77, 212, 198, 0.07), transparent 60%),
        radial-gradient(800px 500px at 92% 4%, rgba(255, 188, 88, 0.05), transparent 55%),
        linear-gradient(rgba(245, 241, 232, 0.022) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245, 241, 232, 0.022) 1px, transparent 1px),
        linear-gradient(155deg, #0d0f15 0%, #15171e 48%, #0e1015 100%);
      background-size: auto, auto, 44px 44px, 44px 44px, auto;
      -webkit-font-smoothing: antialiased;
    }

    button, input, textarea, select { font: inherit; }

    .app {
      width: min(1200px, calc(100% - 32px));
      margin: 0 auto;
      padding: 36px 0 60px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      margin-bottom: 30px;
    }

    .brand { display: flex; align-items: center; gap: 15px; min-width: 0; }

    .mark {
      width: 52px; height: 52px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      display: grid; place-items: center;
      background: linear-gradient(135deg, rgba(77, 212, 198, 0.16), transparent 50%), var(--panel);
      box-shadow: inset 0 1px rgba(255, 255, 255, 0.05), 0 6px 18px rgba(0, 0, 0, 0.25);
      flex: 0 0 auto; position: relative; overflow: hidden;
    }

    .mark::after {
      content: ""; position: absolute; inset: 0;
      background: linear-gradient(135deg, transparent 40%, rgba(77, 212, 198, 0.1) 50%, transparent 60%);
      animation: shimmer 4s ease-in-out infinite;
    }

    @keyframes shimmer { 0%, 100% { transform: translateX(-100%); } 50% { transform: translateX(100%); } }

    .mark span {
      font-family: "JetBrains Mono", monospace;
      font-size: 16px; font-weight: 700; color: var(--teal);
      position: relative; z-index: 1;
    }

    h1 {
      font-size: clamp(28px, 5vw, 46px);
      line-height: 0.96; margin: 0; letter-spacing: -0.02em; font-weight: 900;
      background: linear-gradient(135deg, var(--text) 0%, #d8d4c8 100%);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }

    .subtitle { margin: 7px 0 0; color: var(--muted); font-size: 14px; }

    .topbar-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

    .status {
      display: flex; align-items: center; gap: 9px;
      padding: 9px 14px;
      border: 1px solid var(--line); border-radius: 999px;
      background: rgba(21, 24, 31, 0.85); backdrop-filter: blur(8px);
      color: var(--muted);
      font-family: "JetBrains Mono", monospace; font-size: 12px; white-space: nowrap;
      transition: border-color 0.2s ease;
    }

    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--faint); transition: all 0.2s ease; }

    .status.live .status-dot { background: var(--green); box-shadow: 0 0 0 5px rgba(139, 214, 118, 0.12), 0 0 14px rgba(139, 214, 118, 0.65); animation: pulse 2.4s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { box-shadow: 0 0 0 5px rgba(139, 214, 118, 0.12), 0 0 14px rgba(139, 214, 118, 0.65); } 50% { box-shadow: 0 0 0 7px rgba(139, 214, 118, 0.06), 0 0 10px rgba(139, 214, 118, 0.4); } }
    .status.live { border-color: rgba(139, 214, 118, 0.3); }
    .status.syncing .status-dot { background: var(--amber); box-shadow: 0 0 0 5px rgba(255, 188, 88, 0.12); animation: spin-pulse 1s ease-in-out infinite; }
    @keyframes spin-pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3); } }
    .status.syncing { border-color: rgba(255, 188, 88, 0.3); }
    .status.offline .status-dot { background: var(--rose); box-shadow: 0 0 0 5px rgba(255, 111, 141, 0.12); }
    .status.offline { border-color: rgba(255, 111, 141, 0.3); }

    .view-toggle {
      display: flex; gap: 0; border: 1px solid var(--line); border-radius: 999px; overflow: hidden; background: rgba(21, 24, 31, 0.85);
    }
    .view-toggle button {
      border: 0; background: transparent; color: var(--muted); padding: 9px 14px; cursor: pointer;
      font-size: 12px; font-weight: 700; display: flex; align-items: center; gap: 6px; transition: all 0.16s ease;
    }
    .view-toggle button.active { background: var(--teal); color: #071412; }
    .view-toggle button:not(.active):hover { color: var(--text); background: var(--panel-2); }
    .view-toggle button i { width: 15px; height: 15px; }
    .trash-badge {
      background: var(--rose-soft); color: var(--rose); border-radius: 999px; padding: 1px 7px; font-size: 11px; font-family: "JetBrains Mono", monospace;
    }
    .view-toggle button.active .trash-badge { background: rgba(7,20,18,0.25); color: #071412; }

    .layout { display: grid; grid-template-columns: 370px minmax(0, 1fr); gap: 22px; align-items: start; }

    .panel {
      border: 1px solid var(--line); border-radius: var(--radius);
      background: rgba(21, 24, 31, 0.92); backdrop-filter: blur(10px); box-shadow: var(--shadow);
    }

    .composer { position: sticky; top: 18px; padding: 20px; }

    .panel-title { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 20px; }
    .panel-title h2 { margin: 0; font-size: 13px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text); font-weight: 700; }

    .mini-count {
      font-family: "JetBrains Mono", monospace; color: var(--teal); font-size: 12px;
      padding: 4px 9px; border-radius: 999px; border: 1px solid rgba(77, 212, 198, 0.35); background: rgba(77, 212, 198, 0.08);
    }

    .field { display: grid; gap: 8px; margin-bottom: 14px; }
    label { color: var(--muted); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; }

    .input-wrap {
      display: flex; align-items: center; gap: 10px;
      min-height: 48px; border: 1px solid var(--line); border-radius: var(--radius-sm);
      background: #0e1015; color: var(--muted); padding: 0 13px;
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
    }
    .input-wrap:focus-within { border-color: var(--teal); box-shadow: 0 0 0 4px rgba(77, 212, 198, 0.1); }
    .input-wrap i { width: 18px; height: 18px; flex: 0 0 auto; }

    input, textarea, select {
      width: 100%; min-width: 0; border: 0; outline: 0; background: transparent; color: var(--text);
    }
    input { padding: 13px 0; }
    textarea { padding: 11px 0; resize: vertical; min-height: 48px; line-height: 1.5; font-family: inherit; }
    input::placeholder, textarea::placeholder { color: var(--faint); }
    input[type="date"] { color-scheme: dark; }
    select { padding: 13px 0; cursor: pointer; }
    select option { background: var(--panel); }

    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .primary-btn {
      width: 100%; min-height: 48px;
      display: inline-flex; align-items: center; justify-content: center; gap: 9px;
      border: 1px solid rgba(77, 212, 198, 0.42); border-radius: var(--radius-sm);
      color: #071412; background: linear-gradient(135deg, var(--teal) 0%, #3ec4b6 100%);
      font-weight: 800; cursor: pointer;
      transition: transform 0.16s ease, box-shadow 0.16s ease, filter 0.16s ease;
      box-shadow: 0 4px 14px rgba(77, 212, 198, 0.2);
    }
    .primary-btn:hover { transform: translateY(-1px); box-shadow: 0 14px 30px rgba(77, 212, 198, 0.28); filter: saturate(1.1); }
    .primary-btn:active { transform: translateY(0); }
    .primary-btn:focus-visible, .icon-btn:focus-visible, .ghost-btn:focus-visible { outline: 2px solid var(--amber); outline-offset: 3px; }
    .primary-btn i, .ghost-btn i, .icon-btn i { width: 18px; height: 18px; }

    .metrics { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 20px; }
    .metric {
      border: 1px solid var(--line-soft); border-radius: var(--radius-sm);
      background: rgba(255, 255, 255, 0.025); padding: 13px;
      transition: border-color 0.18s ease, background 0.18s ease;
    }
    .metric:hover { border-color: var(--line); background: rgba(255, 255, 255, 0.04); }
    .metric strong { display: block; font-size: 22px; line-height: 1; color: var(--text); font-weight: 800; }
    .metric span { display: block; margin-top: 5px; color: var(--faint); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; }
    .metric.due-overdue strong { color: var(--rose); }
    .metric.due-today strong { color: var(--amber); }
    .metric.due-payment strong { color: var(--green); }

    .board { min-width: 0; }
    .board-head {
      display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 14px;
      padding: 18px; border-bottom: 1px solid var(--line); align-items: center;
    }
    .search { margin: 0; }

    .ghost-btn {
      min-height: 44px; display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      border: 1px solid var(--line); border-radius: var(--radius-sm);
      background: var(--panel-2); color: var(--muted); padding: 0 13px; cursor: pointer;
      transition: color 0.16s ease, border-color 0.16s ease, background 0.16s ease, transform 0.16s ease;
    }
    .ghost-btn:hover { color: var(--text); border-color: var(--amber); background: var(--amber-soft); transform: translateY(-1px); }
    .ghost-btn:active { transform: translateY(0); }

    .board-foot {
      padding: 12px 18px; border-top: 1px solid var(--line);
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      color: var(--faint); font-size: 11px; font-family: "JetBrains Mono", monospace;
    }
    .board-foot .last-sync { display: flex; align-items: center; gap: 6px; }
    .board-foot .last-sync i { width: 13px; height: 13px; }
    .board-foot .auto-tag { color: var(--teal); }

    .task-list { list-style: none; padding: 0; margin: 0; }

    .task-row {
      border-bottom: 1px solid var(--line-soft);
      background: rgba(21, 24, 31, 0.5);
      transition: background 0.16s ease, border-color 0.16s ease;
      animation: row-in 0.3s ease both;
    }
    @keyframes row-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .task-row:hover, .task-row:focus-within { background: rgba(29, 32, 41, 0.9); border-color: rgba(77, 212, 198, 0.26); }
    .task-row:last-child { border-bottom: 0; }
    .task-row.trashed { opacity: 0.6; background: rgba(59, 28, 37, 0.25); }
    .task-row.trashed:hover { background: rgba(59, 28, 37, 0.4); }

    .task-row-main {
      display: grid; grid-template-columns: 44px minmax(0, 1fr) auto; gap: 14px;
      padding: 16px 18px; align-items: start;
    }

    .task-number {
      width: 44px; height: 44px; display: grid; place-items: center;
      border: 1px solid var(--line); border-radius: var(--radius-sm);
      color: var(--faint); font-family: "JetBrains Mono", monospace; font-size: 12px; font-weight: 700; background: #0e1015;
    }

    .task-copy { min-width: 0; display: grid; gap: 8px; }

    .task-text { margin: 0; font-size: 16px; line-height: 1.42; font-weight: 700; color: var(--text); overflow-wrap: anywhere; cursor: pointer; }
    .task-text:hover { color: var(--teal); }

    .meta { display: flex; flex-wrap: wrap; gap: 7px; align-items: center; color: var(--faint); font-size: 12px; }

    .pill {
      display: inline-flex; align-items: center; gap: 5px;
      min-height: 26px; border-radius: 999px; border: 1px solid var(--line);
      padding: 0 10px; color: var(--muted); background: #0e1015; font-size: 12px; white-space: nowrap;
    }
    .pill i { width: 13px; height: 13px; }
    .pill.today { border-color: rgba(255, 188, 88, 0.5); color: var(--amber); background: var(--amber-soft); }
    .pill.overdue { border-color: rgba(255, 111, 141, 0.5); color: var(--rose); background: var(--rose-soft); }
    .pill.upcoming { border-color: rgba(77, 212, 198, 0.45); color: var(--teal); background: var(--teal-soft); }
    .pill.payment { border-color: rgba(139, 214, 118, 0.45); color: var(--green); background: var(--green-soft); }
    .pill.phone { border-color: rgba(167, 164, 149, 0.3); }
    .pill.deleting { border-color: rgba(255, 111, 141, 0.5); color: var(--rose); background: var(--rose-soft); }

    .task-actions { display: flex; align-items: center; gap: 8px; }

    .icon-btn {
      width: 40px; height: 40px;
      border: 1px solid var(--line); border-radius: var(--radius-sm);
      background: #0e1015; color: var(--muted);
      display: grid; place-items: center; cursor: pointer;
      transition: opacity 0.16s ease, transform 0.16s ease, background 0.16s ease, border-color 0.16s ease, color 0.16s ease;
    }

    .complete-btn:hover { color: var(--green); border-color: rgba(139, 214, 118, 0.5); background: var(--green-soft); }
    .trash-btn:hover { color: var(--rose); border-color: rgba(255, 111, 141, 0.5); background: var(--rose-soft); }
    .restore-btn:hover { color: var(--teal); border-color: rgba(77, 212, 198, 0.5); background: var(--teal-soft); }
    .delete-forever-btn:hover { color: var(--rose); border-color: rgba(255, 111, 141, 0.6); background: var(--rose-soft); }

    .expand-btn { width: 40px; height: 40px; }
    .expand-btn:hover { color: var(--teal); border-color: rgba(77, 212, 198, 0.4); }
    .expand-btn i { transition: transform 0.2s ease; }
    .task-row.expanded .expand-btn i { transform: rotate(90deg); }

    .edit-btn { opacity: 0; transform: translateX(4px); }
    .task-row:hover .edit-btn, .task-row:focus-within .edit-btn { opacity: 1; transform: translateX(0); }
    .edit-btn:hover { color: var(--teal); border-color: rgba(77, 212, 198, 0.5); background: var(--teal-soft); }

    .task-detail {
      display: none;
      padding: 0 18px 16px 76px;
      border-top: 1px solid var(--line-soft);
      margin-top: 8px;
    }
    .task-row.expanded .task-detail { display: block; animation: row-in 0.2s ease; }

    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .detail-item { display: grid; gap: 4px; }
    .detail-label { color: var(--faint); font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 700; }
    .detail-value { color: var(--text); font-size: 14px; line-height: 1.5; overflow-wrap: anywhere; }
    .detail-value.empty { color: var(--faint); font-style: italic; }
    .detail-value.payment { color: var(--green); font-weight: 700; }
    .detail-value.phone a { color: var(--teal); text-decoration: none; }
    .detail-value.phone a:hover { text-decoration: underline; }

    .edit-box { display: grid; gap: 10px; padding: 14px 18px 16px 76px; border-top: 1px solid var(--line-soft); }
    .edit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .edit-grid.full { grid-template-columns: 1fr; }
    .edit-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .save-btn { color: var(--teal); border-color: rgba(77, 212, 198, 0.4); }
    .cancel-btn { color: var(--rose); }
    .cancel-btn:hover { border-color: rgba(255, 111, 141, 0.5); background: var(--rose-soft); }

    .empty { padding: 64px 18px; text-align: center; color: var(--faint); }
    .empty i { width: 40px; height: 40px; color: var(--teal); margin-bottom: 14px; opacity: 0.7; }
    .empty strong { display: block; color: var(--text); margin-bottom: 6px; font-size: 16px; }
    .empty span { font-size: 13px; }

    .skeleton-row { padding: 16px 18px; border-bottom: 1px solid var(--line-soft); display: grid; grid-template-columns: 44px 1fr; gap: 14px; align-items: center; }
    .skeleton-block {
      background: linear-gradient(90deg, var(--panel-2) 0%, var(--panel-3) 50%, var(--panel-2) 100%);
      background-size: 200% 100%; animation: skeleton 1.4s ease-in-out infinite; border-radius: var(--radius-sm);
    }
    @keyframes skeleton { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .skeleton-row .sk-num { width: 44px; height: 44px; }
    .skeleton-row .sk-line { height: 14px; border-radius: 4px; }
    .skeleton-row .sk-line.w60 { width: 60%; margin-bottom: 8px; }
    .skeleton-row .sk-line.w30 { width: 30%; }

    .toast {
      position: fixed; left: 50%; bottom: 24px;
      transform: translateX(-50%) translateY(18px); opacity: 0; pointer-events: none;
      border: 1px solid var(--line); border-radius: var(--radius);
      background: #0e1015; color: var(--text); padding: 12px 16px; box-shadow: var(--shadow);
      transition: opacity 0.18s ease, transform 0.18s ease; z-index: 10;
      max-width: calc(100% - 32px); font-size: 13px; display: flex; align-items: center; gap: 9px;
    }
    .toast i { width: 16px; height: 16px; flex: 0 0 auto; }
    .toast.ok { border-color: rgba(139, 214, 118, 0.4); }
    .toast.ok i { color: var(--green); }
    .toast.err { border-color: rgba(255, 111, 141, 0.4); }
    .toast.err i { color: var(--rose); }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } .composer { position: static; } }
    @media (max-width: 620px) {
      .app { width: min(100% - 22px, 1200px); padding-top: 22px; }
      .topbar { align-items: flex-start; flex-direction: column; }
      .topbar-right { width: 100%; }
      .status { flex: 1; justify-content: center; }
      .board-head { grid-template-columns: 1fr; }
      .task-row-main { grid-template-columns: 36px 1fr; }
      .task-number { width: 36px; height: 36px; }
      .task-actions { grid-column: 1 / -1; justify-content: flex-end; margin-top: 4px; }
      .task-detail, .edit-box { padding-left: 18px; }
      .detail-grid, .edit-grid { grid-template-columns: 1fr; }
      .metrics { grid-template-columns: 1fr 1fr; }
      .field-row { grid-template-columns: 1fr; }
      .edit-btn { opacity: 1; transform: none; }
    }
    @media (hover: none) { .edit-btn { opacity: 1; transform: none; } }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; scroll-behavior: auto !important; }
    }
    /* Product-polish layer: clearer hierarchy, calmer panels and better touch targets. */
    .app { width: min(1280px, calc(100% - 36px)); }
    .topbar { padding-bottom: 34px; }
    .panel { box-shadow: 0 28px 70px rgba(0,0,0,.34); }
    .composer { border-color: rgba(77,212,198,.28); }
    .board-head { background: linear-gradient(115deg, rgba(77,212,198,.055), transparent 46%); }
    .metric { min-height: 98px; }
    .metric strong { letter-spacing: -.045em; }
    .task-row { border-left: 2px solid transparent; }
    .task-row:hover, .task-row:focus-within { border-left-color: var(--teal); }
    .primary-btn { min-height: 52px; letter-spacing: .01em; }
    .input-wrap { min-height: 50px; }
    .task-detail { background: rgba(6,8,13,.18); }
    .toast { z-index: 30; }
    @media (max-width: 700px) {
      .app { width: min(100% - 22px, 1200px); }
      .metrics { gap: 8px; }
      .metric { padding: 11px; }
      .metric strong { font-size: 20px; }
      .board-head { padding: 14px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="mark" aria-hidden="true"><span>CG</span></div>
        <div>
          <h1>Cave Graphics</h1>
          <p class="subtitle">Panel central de recursos y entregas graficas</p>
        </div>
      </div>
      <div class="topbar-right">
        <div class="view-toggle" id="view-toggle">
          <button type="button" data-view="active" class="active"><i data-lucide="list"></i>Activas</button>
          <button type="button" data-view="trash"><i data-lucide="trash-2"></i>Papelera <span class="trash-badge" id="trash-count">0</span></button>
        </div>
        <div class="status" id="sync-status" role="status" aria-live="polite">
          <span class="status-dot"></span>
          <span id="sync-text">Conectando</span>
        </div>
      </div>
    </header>

    <div class="layout">
      <section class="panel composer" aria-label="Nueva tarea">
        <div class="panel-title">
          <h2>Nueva tarea</h2>
          <span class="mini-count" id="active-count">0 activas</span>
        </div>

        <form id="task-form" autocomplete="off">
          <div class="field">
            <label for="task-input">Titulo</label>
            <div class="input-wrap">
              <i data-lucide="pen-line"></i>
              <input id="task-input" type="text" placeholder="Logo, banner, mockup, ajuste..." required>
            </div>
          </div>

          <div class="field">
            <label for="desc-input">Descripcion</label>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    (() => {
      const STORAGE_KEY = "cave-graphics-panel-cache";
      const TABLE = "tasks";
      const SUPABASE_URL = "https://cgquvuclhkqxwebpgsdx.supabase.co";
      const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNncXV2dWNsaGtxeHdlYnBnc2R4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MzE3MTgsImV4cCI6MjA5NzMwNzcxOH0.cbybLnhFO7DgKqlX_BlxJaIao8OJcqBnkPkhq6G9bNI";
      const POLL_INTERVAL = 30000;
      const TRASH_TTL_MS = 2 * 24 * 60 * 60 * 1000; // 2 dias en ms

      const els = {
        form: document.getElementById("task-form"),
        input: document.getElementById("task-input"),
        desc: document.getElementById("desc-input"),
        date: document.getElementById("date-input"),
        phone: document.getElementById("phone-input"),
        payment: document.getElementById("payment-input"),
        search: document.getElementById("search-input"),
        list: document.getElementById("task-list"),
        refresh: document.getElementById("refresh-btn"),
        sync: document.getElementById("sync-status"),
        syncText: document.getElementById("sync-text"),
        activeCount: document.getElementById("active-count"),
        todayCount: document.getElementById("today-count"),
        overdueCount: document.getElementById("overdue-count"),
        paymentTotal: document.getElementById("payment-total"),
        metricToday: document.getElementById("metric-today"),
        metricOverdue: document.getElementById("metric-overdue"),
        metricPayment: document.getElementById("metric-payment"),
        trashCount: document.getElementById("trash-count"),
        lastSyncText: document.getElementById("last-sync-text"),
        viewToggle: document.getElementById("view-toggle"),
        toast: document.getElementById("toast")
      };

      const state = {
        client: null,
        channel: null,
        tasks: [],
        editingId: null,
        expandedId: null,
        query: "",
        view: "active",
        refreshTimer: null,
        pollTimer: null,
        toastTimer: null,
        countdownTimer: null,
        lastSyncAt: 0
      };

      function nowMs() { return Date.now(); }
      function id() { if (crypto && crypto.randomUUID) return crypto.randomUUID(); return nowMs().toString(36) + Math.random().toString(36).slice(2, 9); }

      function toMs(value) {
        if (typeof value === "number") return value;
        if (typeof value === "string" && /^\d+$/.test(value)) return Number(value);
        const parsed = Date.parse(value || "");
        return Number.isFinite(parsed) ? parsed : nowMs();
      }

      function toNum(value) {
        const n = Number(value);
        return Number.isFinite(n) ? n : 0;
      }

      function normalize(row) {
        return {
          id: String(row.id),
          text: String(row.text || "").trim(),
          description: String(row.description || "").trim(),
          date: row.date || "",
          phone: String(row.phone || "").trim(),
          paymentAmount: toNum(row.payment_amount),
          createdAt: toMs(row.created_at),
          updatedAt: toMs(row.updated_at || row.created_at),
          deletedAt: row.deleted_at ? toMs(row.deleted_at) : null
        };
      }

      function dbRow(task) {
        return {
          id: task.id,
          text: task.text,
          description: task.description || null,
          date: task.date || null,
          phone: task.phone || null,
          payment_amount: task.paymentAmount || 0,
          created_at: task.createdAt,
          updated_at: task.updatedAt || task.createdAt
        };
      }

      function persist() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.tasks)); } catch {} }

      function hydrate() {
        try {
          const cached = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
          state.tasks = cached.map(normalize).filter(task => task.text);
        } catch { state.tasks = []; }
      }

      function setStatus(kind, label) { els.sync.className = "status " + kind; els.syncText.textContent = label; }

      function showToast(message, kind = "") {
        const iconName = kind === "ok" ? "check-circle" : kind === "err" ? "alert-circle" : "info";
        els.toast.innerHTML = "";
        const icon = document.createElement("i");
        icon.setAttribute("data-lucide", iconName);
        els.toast.appendChild(icon);
        els.toast.appendChild(document.createTextNode(message));
        els.toast.className = "toast show " + kind;
        if (window.lucide) window.lucide.createIcons();
        clearTimeout(state.toastTimer);
        state.toastTimer = setTimeout(() => els.toast.classList.remove("show"), 2800);
      }

      function updateLastSync() {
        state.lastSyncAt = nowMs();
        const label = new Intl.DateTimeFormat("es", { hour: "2-digit", minute: "2-digit", second: "2-digit" }).format(new Date(state.lastSyncAt));
        els.lastSyncText.textContent = "Actualizado a las " + label;
      }

      function sortTasks(tasks) {
        return [...tasks].sort((a, b) => {
          const newest = b.createdAt - a.createdAt;
          if (newest) return newest;
          return b.updatedAt - a.updatedAt;
        });
      }

      function daysUntil(dateString) {
        if (!dateString) return null;
        const today = new Date(); today.setHours(0, 0, 0, 0);
        const target = new Date(dateString + "T00:00:00");
        return Math.round((target - today) / 86400000);
      }

      function dueMeta(task) {
        const diff = daysUntil(task.date);
        if (diff === null) return { cls: "", text: "Sin fecha", icon: "calendar" };
        if (diff < 0) return { cls: "overdue", text: "Vencida D+" + Math.abs(diff), icon: "alert-circle" };
        if (diff === 0) return { cls: "today", text: "Entrega hoy", icon: "flame" };
        return { cls: "upcoming", text: "D-" + diff, icon: "calendar-clock" };
      }

      function dateLabel(dateString) {
        if (!dateString) return "sin entrega";
        return new Intl.DateTimeFormat("es", { day: "2-digit", month: "short", year: "numeric" }).format(new Date(dateString + "T00:00:00"));
      }

      function timeLabel(ms) {
        return new Intl.DateTimeFormat("es", { day: "2-digit", month: "short", hour: "2-digit", minute: "2-digit" }).format(new Date(ms));
      }

      function money(n) {
        return "$" + toNum(n).toLocaleString("es", { minimumFractionDigits: 0, maximumFractionDigits: 2 });
      }

      function trashCountdown(task) {
        if (!task.deletedAt) return "";
        const expiresAt = task.deletedAt + TRASH_TTL_MS;
        const remaining = expiresAt - nowMs();
        if (remaining <= 0) return "Se eliminara pronto";
        const hours = Math.floor(remaining / 3600000);
        const mins = Math.floor((remaining % 3600000) / 60000);
        if (hours >= 24) {
          const days = Math.floor(hours / 24);
          return "Se elimina en " + days + "d " + (hours % 24) + "h";
        }
        if (hours > 0) return "Se elimina en " + hours + "h " + mins + "m";
        return "Se elimina en " + mins + "m";
      }

      function upsertLocal(task) {
        const next = normalize(task);
        const index = state.tasks.findIndex(item => item.id === next.id);
        if (index >= 0) state.tasks[index] = { ...state.tasks[index], ...next };
        else state.tasks.push(next);
        state.tasks = sortTasks(state.tasks);
        persist();
        render();
      }

      function removeLocal(taskId) {
        state.tasks = state.tasks.filter(task => task.id !== taskId);
        if (state.editingId === taskId) state.editingId = null;
        if (state.expandedId === taskId) state.expandedId = null;
        persist();
        render();
      }

      async function fetchLatest(source = "manual") {
        if (!state.client) return;
        if (source !== "startup") setStatus("syncing", "Sincronizando");
        const { data, error } = await state.client.from(TABLE).select("*").order("created_at", { ascending: false });
        if (error) {
          setStatus("offline", "Sin conexion");
          if (source === "manual") showToast("No se pudo actualizar desde Supabase", "err");
          return;
        }
        state.tasks = sortTasks((data || []).map(normalize).filter(task => task.text));
        persist();
        render();
        updateLastSync();
        setStatus("live", "En vivo");
      }

      function scheduleRefresh() {
        clearTimeout(state.refreshTimer);
        state.refreshTimer = setTimeout(() => fetchLatest("realtime"), 260);
      }

      function startPolling() {
        clearInterval(state.pollTimer);
        state.pollTimer = setInterval(() => { if (state.client && !document.hidden) fetchLatest("poll"); }, POLL_INTERVAL);
      }

      function startCountdownTicker() {
        clearInterval(state.countdownTimer);
        state.countdownTimer = setInterval(() => {
          if (state.view === "trash") {
            document.querySelectorAll("[data-countdown]").forEach(el => {
              const taskId = el.dataset.countdown;
              const task = state.tasks.find(t => t.id === taskId);
              if (task) el.textContent = trashCountdown(task);
            });
          }
        }, 30000);
      }

      async function connect() {
        if (!window.supabase) { setStatus("offline", "Local"); return; }
        state.client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
          realtime: { params: { eventsPerSecond: 8 } },
          auth: { persistSession: false }
        });
        await fetchLatest("startup");
        try {
          state.channel = state.client.channel("public:tasks")
            .on("postgres_changes", { event: "*", schema: "public", table: TABLE }, payload => {
              if (payload.eventType === "DELETE") removeLocal(String(payload.old.id));
              else if (payload.new) upsertLocal(payload.new);
              scheduleRefresh();
            })
            .subscribe(status => {
              if (status === "SUBSCRIBED") { setStatus("live", "En vivo"); startPolling(); startCountdownTicker(); }
              if (status === "CHANNEL_ERROR" || status === "TIMED_OUT" || status === "CLOSED") setStatus("offline", "Sin conexion");
            });
        } catch { setStatus("offline", "Sin conexion"); }
      }

      async function insertRemote(task) {
        if (!state.client) return false;
        const payload = dbRow(task);
        let result = await state.client.from(TABLE).insert(payload);
        if (result.error && String(result.error.message || "").includes("updated_at")) { delete payload.updated_at; result = await state.client.from(TABLE).insert(payload); }
        if (result.error) { setStatus("offline", "Sin conexion"); showToast("No se pudo guardar en Supabase", "err"); return false; }
        return true;
      }

      async function updateRemote(taskId, patch) {
        if (!state.client) return false;
        const payload = { ...patch, updated_at: nowMs() };
        let result = await state.client.from(TABLE).update(payload).eq("id", taskId);
        if (result.error && String(result.error.message || "").includes("updated_at")) { delete payload.updated_at; result = await state.client.from(TABLE).update(payload).eq("id", taskId); }
        if (result.error) { setStatus("offline", "Sin conexion"); showToast("No se pudo editar en Supabase", "err"); return false; }
        return true;
      }

      async function deleteRemote(taskId) {
        if (!state.client) return false;
        const { error } = await state.client.from(TABLE).delete().eq("id", taskId);
        if (error) { setStatus("offline", "Sin conexion"); showToast("No se pudo eliminar en Supabase", "err"); return false; }
        return true;
      }

      async function addTask(formdata) {
        const trimmed = formdata.text.trim();
        if (!trimmed) return;
        const createdAt = nowMs();
        const task = {
          id: id(),
          text: trimmed,
          description: formdata.description.trim(),
          date: formdata.date || "",
          phone: formdata.phone.trim(),
          paymentAmount: toNum(formdata.payment),
          createdAt,
          updatedAt: createdAt,
          deletedAt: null
        };
        upsertLocal(task);
        els.form.reset();
        els.input.focus();
        const saved = await insertRemote(task);
        if (saved) showToast("Tarea agregada", "ok");
        else if (!state.client) showToast("Guardado localmente");
      }

      async function commitEdit(taskId, fields) {
        const trimmed = (fields.text || "").trim();
        if (!trimmed) return;
        const task = state.tasks.find(item => item.id === taskId);
        if (!task) return;
        const patch = {
          text: trimmed,
          description: (fields.description || "").trim(),
          date: fields.date || null,
          phone: (fields.phone || "").trim(),
          payment_amount: toNum(fields.payment)
        };
        upsertLocal({ ...task, ...patch, updatedAt: nowMs() });
        state.editingId = null;
        render();
        const saved = await updateRemote(taskId, patch);
        if (saved) showToast("Tarea actualizada", "ok");
      }

      async function completeTask(taskId) {
        removeLocal(taskId);
        const saved = await deleteRemote(taskId);
        if (saved) showToast("Tarea completada", "ok");
      }

      async function trashTask(taskId) {
        const task = state.tasks.find(item => item.id === taskId);
        if (!task) return;
        const patch = { deleted_at: nowMs() };
        upsertLocal({ ...task, ...patch, updatedAt: nowMs() });
        await updateRemote(taskId, patch);
        showToast("Movido a papelera", "ok");
      }

      async function restoreTask(taskId) {
        const task = state.tasks.find(item => item.id === taskId);
        if (!task) return;
        const patch = { deleted_at: null };
        upsertLocal({ ...task, ...patch, updatedAt: nowMs() });
        await updateRemote(taskId, patch);
        showToast("Tarea restaurada", "ok");
      }

      async function deleteForever(taskId) {
        removeLocal(taskId);
        const saved = await deleteRemote(taskId);
        if (saved) showToast("Eliminada definitivamente", "ok");
      }

      function visibleTasks() {
        const query = state.query.trim().toLowerCase();
        let list = state.tasks.filter(t => state.view === "trash" ? t.deletedAt : !t.deletedAt);
        list = sortTasks(list);
        if (!query) return list;
        return list.filter(task => {
          const haystack = [task.text, task.description, task.date, task.phone, dateLabel(task.date), timeLabel(task.createdAt)].join(" ").toLowerCase();
          return haystack.includes(query);
        });
      }

      function renderStats() {
        const active = state.tasks.filter(t => !t.deletedAt);
        const trashed = state.tasks.filter(t => t.deletedAt);
        const total = active.length;
        const today = active.filter(task => daysUntil(task.date) === 0).length;
        const overdue = active.filter(task => { const diff = daysUntil(task.date); return diff !== null && diff < 0; }).length;
        const payTotal = active.reduce((sum, t) => sum + toNum(t.paymentAmount), 0);

        els.activeCount.textContent = total + (total === 1 ? " activa" : " activas");
        els.todayCount.textContent = today;
        els.overdueCount.textContent = overdue;
        els.paymentTotal.textContent = money(payTotal);
        els.trashCount.textContent = trashed.length;
        els.metricToday.className = "metric" + (today > 0 ? " due-today" : "");
        els.metricOverdue.className = "metric" + (overdue > 0 ? " due-overdue" : "");
        els.metricPayment.className = "metric" + (payTotal > 0 ? " due-payment" : "");
      }

      function makeIcon(name) { const icon = document.createElement("i"); icon.setAttribute("data-lucide", name); return icon; }

      function renderDetail(task, container) {
        const grid = document.createElement("div");
        grid.className = "detail-grid";

        const descItem = document.createElement("div");
        descItem.className = "detail-item";
        const descLabel = document.createElement("span"); descLabel.className = "detail-label"; descLabel.textContent = "Descripcion";
        const descVal = document.createElement("div"); descVal.className = "detail-value" + (task.description ? "" : " empty"); descVal.textContent = task.description || "Sin descripcion";
        descItem.append(descLabel, descVal);

        const phoneItem = document.createElement("div");
        phoneItem.className = "detail-item";
        const phoneLabel = document.createElement("span"); phoneLabel.className = "detail-label"; phoneLabel.textContent = "Telefono";
        const phoneVal = document.createElement("div"); phoneVal.className = "detail-value phone" + (task.phone ? "" : " empty");
        if (task.phone) { const a = document.createElement("a"); a.href = "tel:" + task.phone; a.textContent = task.phone; phoneVal.appendChild(a); }
        else phoneVal.textContent = "Sin telefono";
        phoneItem.append(phoneLabel, phoneVal);

        const payItem = document.createElement("div");
        payItem.className = "detail-item";
        const payLabel = document.createElement("span"); payLabel.className = "detail-label"; payLabel.textContent = "Abono";
        const payVal = document.createElement("div"); payVal.className = "detail-value payment"; payVal.textContent = task.paymentAmount > 0 ? money(task.paymentAmount) : "$0";
        payItem.append(payLabel, payVal);

        const dateItem = document.createElement("div");
        dateItem.className = "detail-item";
        const dateLabel2 = document.createElement("span"); dateLabel2.className = "detail-label"; dateLabel2.textContent = "Entrega";
        const dateVal = document.createElement("div"); dateVal.className = "detail-value"; dateVal.textContent = task.date ? dateLabel(task.date) : "Sin fecha";
        dateItem.append(dateLabel2, dateVal);

        grid.append(descItem, phoneItem, payItem, dateItem);
        container.appendChild(grid);
      }

      function renderEdit(task, container) {
        const box = document.createElement("form");
        box.className = "edit-box";

        const titleGrid = document.createElement("div");
        titleGrid.className = "edit-grid full";
        const titleWrap = document.createElement("div"); titleWrap.className = "input-wrap";
        titleWrap.appendChild(makeIcon("pen-line"));
        const titleInput = document.createElement("input"); titleInput.type = "text"; titleInput.value = task.text; titleInput.required = true;
        titleWrap.appendChild(titleInput);
        titleGrid.appendChild(titleWrap);

        const descGrid = document.createElement("div");
        descGrid.className = "edit-grid full";
        const descWrap = document.createElement("div"); descWrap.className = "input-wrap"; descWrap.style.alignItems = "flex-start"; descWrap.style.paddingTop = "11px";
        descWrap.appendChild(makeIcon("align-left"));
        const descInput = document.createElement("textarea"); descInput.rows = 3; descInput.value = task.description || ""; descInput.placeholder = "Descripcion...";
        descWrap.appendChild(descInput);
        descGrid.appendChild(descWrap);

        const grid = document.createElement("div");
        grid.className = "edit-grid";
        const dateWrap = document.createElement("div"); dateWrap.className = "input-wrap";
        dateWrap.appendChild(makeIcon("calendar-days"));
        const dateInput = document.createElement("input"); dateInput.type = "date"; dateInput.value = task.date || "";
        dateWrap.appendChild(dateInput);

        const phoneWrap = document.createElement("div"); phoneWrap.className = "input-wrap";
        phoneWrap.appendChild(makeIcon("phone"));
        const phoneInput = document.createElement("input"); phoneInput.type = "tel"; phoneInput.value = task.phone || ""; phoneInput.placeholder = "Telefono";
        phoneWrap.appendChild(phoneInput);
        grid.append(dateWrap, phoneWrap);

        const payGrid = document.createElement("div");
        payGrid.className = "edit-grid full";
        const payWrap = document.createElement("div"); payWrap.className = "input-wrap";
        payWrap.appendChild(makeIcon("wallet"));
        const payInput = document.createElement("input"); payInput.type = "number"; payInput.step = "0.01"; payInput.min = "0"; payInput.value = task.paymentAmount || 0; payInput.placeholder = "Abono";
        payWrap.appendChild(payInput);
        payGrid.appendChild(payWrap);

        const actions = document.createElement("div");
        actions.className = "edit-actions";
        const save = document.createElement("button"); save.className = "ghost-btn save-btn"; save.type = "submit";
        save.append(makeIcon("check"), document.createTextNode("Guardar"));
        const cancel = document.createElement("button"); cancel.className = "ghost-btn cancel-btn"; cancel.type = "button";
        cancel.append(makeIcon("x"), document.createTextNode("Cancelar"));
        cancel.addEventListener("click", () => { state.editingId = null; render(); });

        actions.append(save, cancel);
        box.append(titleGrid, descGrid, grid, payGrid, actions);
        box.addEventListener("submit", event => {
          event.preventDefault();
          commitEdit(task.id, {
            text: titleInput.value,
            description: descInput.value,
            date: dateInput.value,
            phone: phoneInput.value,
            payment: payInput.value
          });
        });

        titleInput.addEventListener("keydown", event => { if (event.key === "Escape") { state.editingId = null; render(); } });
        container.appendChild(box);
        requestAnimationFrame(() => { titleInput.focus(); titleInput.setSelectionRange(titleInput.value.length, titleInput.value.length); });
      }

      function renderTask(task, index) {
        const li = document.createElement("li");
        li.className = "task-row" + (task.deletedAt ? " trashed" : "") + (state.expandedId === task.id ? " expanded" : "");
        li.dataset.id = task.id;
        li.style.animationDelay = Math.min(index * 35, 350) + "ms";

        const rowMain = document.createElement("div");
        rowMain.className = "task-row-main";

        const number = document.createElement("span");
        number.className = "task-number";
        number.textContent = String(index + 1).padStart(2, "0");

        const copy = document.createElement("div");
        copy.className = "task-copy";

        if (state.editingId === task.id) {
          renderEdit(task, copy);
        } else {
          const title = document.createElement("p");
          title.className = "task-text";
          title.textContent = task.text;
          title.addEventListener("click", () => {
            state.expandedId = state.expandedId === task.id ? null : task.id;
            render();
          });

          const meta = document.createElement("div");
          meta.className = "meta";

          const due = dueMeta(task);
          const duePill = document.createElement("span");
          duePill.className = "pill " + due.cls;
          duePill.append(makeIcon(due.icon), document.createTextNode(due.text));

          const deliveryPill = document.createElement("span");
          deliveryPill.className = "pill";
          deliveryPill.append(makeIcon("calendar"), document.createTextNode(dateLabel(task.date)));

          const datePill = document.createElement("span");
          datePill.className = "pill";
          datePill.append(makeIcon("clock-3"), document.createTextNode("Agregada " + timeLabel(task.createdAt)));

          meta.append(duePill, deliveryPill, datePill);

          if (task.paymentAmount > 0) {
            const payPill = document.createElement("span");
            payPill.className = "pill payment";
            payPill.append(makeIcon("wallet"), document.createTextNode(money(task.paymentAmount)));
            meta.appendChild(payPill);
          }

          if (task.phone) {
            const phonePill = document.createElement("span");
            phonePill.className = "pill phone";
            phonePill.append(makeIcon("phone"), document.createTextNode(task.phone));
            meta.appendChild(phonePill);
          }

          if (task.deletedAt) {
            const delPill = document.createElement("span");
            delPill.className = "pill deleting";
            delPill.setAttribute("data-countdown", task.id);
            delPill.textContent = trashCountdown(task);
            meta.appendChild(delPill);
          }

          copy.append(title, meta);
        }

        const actions = document.createElement("div");
        actions.className = "task-actions";

        if (state.editingId !== task.id) {
          const expand = document.createElement("button");
          expand.className = "icon-btn expand-btn";
          expand.type = "button";
          expand.title = state.expandedId === task.id ? "Contraer" : "Ver detalle";
          expand.setAttribute("aria-label", "Ver detalle de " + task.text);
          expand.appendChild(makeIcon("chevron-right"));
          expand.addEventListener("click", () => {
            state.expandedId = state.expandedId === task.id ? null : task.id;
            render();
          });
          actions.appendChild(expand);

          if (!task.deletedAt) {
            const edit = document.createElement("button");
            edit.className = "icon-btn edit-btn";
            edit.type = "button"; edit.title = "Editar";
            edit.setAttribute("aria-label", "Editar " + task.text);
            edit.appendChild(makeIcon("pencil"));
            edit.addEventListener("click", () => { state.editingId = task.id; render(); });
            actions.appendChild(edit);

            const trash = document.createElement("button");
            trash.className = "icon-btn trash-btn";
            trash.type = "button"; trash.title = "Mover a papelera";
            trash.setAttribute("aria-label", "Eliminar " + task.text);
            trash.appendChild(makeIcon("trash-2"));
            trash.addEventListener("click", () => trashTask(task.id));
            actions.appendChild(trash);

            const complete = document.createElement("button");
            complete.className = "icon-btn complete-btn";
            complete.type = "button"; complete.title = "Completar y quitar";
            complete.setAttribute("aria-label", "Completar " + task.text);
            complete.appendChild(makeIcon("circle-check"));
            complete.addEventListener("click", () => completeTask(task.id));
            actions.appendChild(complete);
          } else {
            const restore = document.createElement("button");
            restore.className = "icon-btn restore-btn";
            restore.type = "button"; restore.title = "Restaurar";
            restore.setAttribute("aria-label", "Restaurar " + task.text);
            restore.appendChild(makeIcon("rotate-ccw"));
            restore.addEventListener("click", () => restoreTask(task.id));
            actions.appendChild(restore);

            const forever = document.createElement("button");
            forever.className = "icon-btn delete-forever-btn";
            forever.type = "button"; forever.title = "Eliminar para siempre";
            forever.setAttribute("aria-label", "Eliminar para siempre " + task.text);
            forever.appendChild(makeIcon("x-circle"));
            forever.addEventListener("click", () => {
              if (confirm("¿Eliminar definitivamente esta tarea? No se podra recuperar.")) deleteForever(task.id);
            });
            actions.appendChild(forever);
          }
        }

        rowMain.append(number, copy, actions);

        li.appendChild(rowMain);

        if (state.expandedId === task.id && state.editingId !== task.id) {
          const detail = document.createElement("div");
          detail.className = "task-detail";
          renderDetail(task, detail);
          li.appendChild(detail);
        }

        return li;
      }

      function renderSkeleton() {
        els.list.innerHTML = "";
        for (let i = 0; i < 3; i++) {
          const row = document.createElement("li");
          row.className = "skeleton-row";
          row.innerHTML = '<div class="skeleton-block sk-num"></div><div><div class="skeleton-block sk-line w60"></div><div class="skeleton-block sk-line w30"></div></div>';
          els.list.appendChild(row);
        }
      }

      function render() {
        renderStats();
        els.list.innerHTML = "";
        const tasks = visibleTasks();
        if (!tasks.length) {
          const empty = document.createElement("li");
          empty.className = "empty";
          const iconName = state.view === "trash" ? (state.query ? "search-x" : "trash-2") : (state.query ? "search-x" : "layers");
          empty.append(makeIcon(iconName));
          const strong = document.createElement("strong");
          strong.textContent = state.query ? "Sin resultados" : (state.view === "trash" ? "Papelera vacia" : "Panel vacio");
          const small = document.createElement("span");
          small.textContent = state.query ? "Prueba con otro filtro." : (state.view === "trash" ? "Las tareas eliminadas aparecen aqui." : "Agrega la primera tarea.");
          empty.append(strong, small);
          els.list.appendChild(empty);
        } else {
          tasks.forEach((task, index) => els.list.appendChild(renderTask(task, index)));
        }
        if (window.lucide) window.lucide.createIcons();
      }

      els.form.addEventListener("submit", event => {
        event.preventDefault();
        addTask({
          text: els.input.value,
          description: els.desc.value,
          date: els.date.value,
          phone: els.phone.value,
          payment: els.payment.value
        });
      });

      els.search.addEventListener("input", event => { state.query = event.target.value; render(); });
      els.refresh.addEventListener("click", () => fetchLatest("manual"));

      els.viewToggle.addEventListener("click", event => {
        const btn = event.target.closest("button[data-view]");
        if (!btn) return;
        state.view = btn.dataset.view;
        els.viewToggle.querySelectorAll("button").forEach(b => b.classList.toggle("active", b === btn));
        state.expandedId = null;
        render();
      });

      window.addEventListener("online", () => fetchLatest("online"));
      window.addEventListener("focus", () => fetchLatest("focus"));
      document.addEventListener("visibilitychange", () => { if (!document.hidden) fetchLatest("visible"); });

      hydrate();
      render();
      if (!state.tasks.length) renderSkeleton();
      connect();
    })();
  </script>
</body>
</html>
