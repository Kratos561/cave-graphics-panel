name: Supabase Keep-Alive

# Objetivo: que el proyecto Supabase Free NUNCA se pause (limite de 7 dias
# de inactividad).
#
# Frecuencia: DIARIA a las 06:00 UTC.
#
# Fase 0.1: Usa Secrets en vez de hardcodear la anon key.
# Fase 1.4: Pinguea health_check (tabla publica) en vez de tasks (ahora protegida por RLS).

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch: {}

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Ping health_check
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail

          MAX_ATTEMPTS=4
          attempt=0
          success=0

          while [ $attempt -lt $MAX_ATTEMPTS ]; do
            attempt=$((attempt + 1))
            echo "--- Intento $attempt de $MAX_ATTEMPTS ---"

            # 1) Lectura de health_check (tabla publica, no requiere auth)
            READ_CODE=$(curl -s -o /tmp/read.json -w "%{http_code}" --max-time 25 \
              "${SUPABASE_URL}/rest/v1/health_check?select=id,pinged_at&limit=1" \
              -H "apikey: ${SUPABASE_ANON_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_ANON_KEY}")
            echo "Lectura health_check -> HTTP $READ_CODE"
            cat /tmp/read.json; echo

            # 2) Escritura: actualizar pinged_at para marcar actividad
            WRITE_CODE=$(curl -s -o /tmp/write.json -w "%{http_code}" --max-time 25 \
              -X PATCH "${SUPABASE_URL}/rest/v1/health_check?id=eq.ping" \
              -H "apikey: ${SUPABASE_ANON_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
              -H "Content-Type: application/json" \
              -H "Prefer: return=minimal" \
              -d "{\"pinged_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}")
            echo "Escritura (update pinged_at) -> HTTP $WRITE_CODE"

            if [ "$READ_CODE" -ge 200 ] && [ "$READ_CODE" -lt 300 ]; then
              echo "✅ Intento $attempt exitoso — el proyecto esta activo."
              success=1
              break
            fi

            if [ $attempt -lt $MAX_ATTEMPTS ]; then
              wait=$((30 * (1 << (attempt - 1))))
              echo "⏳ Reintentando en ${wait}s..."
              sleep $wait
            fi
          done

          if [ $success -ne 1 ]; then
            echo "❌ Todos los intentos fallaron. Revisa el proyecto en Supabase."
            exit 1
          fi
